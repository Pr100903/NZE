<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="NZ Essentials - Your Partner in Utility Management. Lower energy bills, unified connectivity, and sustainable solutions for Kiwi businesses." />
    <title>NZ Essentials | Powering a Brighter Future</title>

    <!-- Preconnect to external domains for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Preload critical font -->
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Anek+Latin:wght@400;500;600;700;800&display=swap"
      as="style"
    />
    
    <!-- Load fonts with display=swap for faster text rendering -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Anek+Latin:wght@400;500;600;700;800&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL@20..48,100..700,0..1&display=swap"
    />
    
    <!-- Critical CSS for initial render -->
    <style>
      :root {
        --primary: #ffe413;
        --gray: #565658;
        --white: #ffffff;
        --black: #000000;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { 
        font-family: 'Anek Latin', sans-serif; 
        background-color: var(--gray);
        color: var(--white);
      }
      #root { min-height: 100vh; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
